AWSTemplateFormatVersion: "2010-09-09"
Description: Very basic CloudFormation template just to ensure that our Lint software executes appropriately.

Parameters:
  AppName:
    Type: String
    Default: governance-lab-app
    Description: Application name used for resource naming and tagging

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment tag

Resources:
  # ------------------------------------------------------------------------------------
  # Security group — Allows HTTPS access from the internet only (misconfigured at first)
  # ------------------------------------------------------------------------------------
  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Application security group for governance lab
      VpcId:
        Fn::ImportValue:
          Fn::Sub: "${AWS::AccountId}-${AWS::Region}-VpcId"
      SecurityGroupIngress:
        - IpProtocol: transmission-control-protocol
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS from internet
      Tags:
        - Key: Environment
          Value: !Sub "${Environment}"
        - Key: Application
          Value: !Sub "${AppName}"

Outputs:
  SecurityGroupId:
    Description: ID of the application security group
    Value: !GetAtt AppSecurityGroup.GroupId
    Export:
      Name: !Sub "${AppName}-sg-id"
