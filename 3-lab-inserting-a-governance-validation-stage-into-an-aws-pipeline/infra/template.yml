AWSTemplateFormatVersion: "2010-09-09"
Description: Shared starter infrastructure for Governance Labs 1-5

Parameters:
  AppName:
    Type: String
    Default: governance-lab-app
    Description: Application name used for resource naming and tagging

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment tag

Resources:
  # ----------------------------------------------------------
  # Security group — Allows HTTP access from the internet only
  # ----------------------------------------------------------
  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Application security group for governance lab
      VpcId:
        Fn::ImportValue:
          Fn::Sub: "${AWS::AccountId}-${AWS::Region}-VpcId"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow HTTP from internet
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: !Ref AppName

Outputs:
  SecurityGroupId:
    Description: ID of the application security group
    Value: !GetAtt AppSecurityGroup.GroupId
    Export:
      Name: !Sub "${AppName}-sg-id"
