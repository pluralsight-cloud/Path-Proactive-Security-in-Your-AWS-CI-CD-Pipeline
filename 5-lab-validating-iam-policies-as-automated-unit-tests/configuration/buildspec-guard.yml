version: 0.2

phases:
  install:
    commands:
      - echo "[1/3] Installing prerequisites for CloudFormation Guard v2..."
      - apt-get update
      - apt-get install -y build-essential curl
      - curl https://sh.rustup.rs -sSf | sh -s -- -y
      - . "$HOME/.cargo/env"
      - cargo install cfn-guard --locked
  pre_build:
    commands:
      - echo "[2/3] Confirming cfn-guard is installed..."
      - . "$HOME/.cargo/env"
      - cfn-guard --version
  build:
    commands:
      - echo "[3/3] Validating IAM policies in infra/template.yml..."
      - . "$HOME/.cargo/env"
      - cfn-guard validate --rules cfn-guard/iam-no-s3-wildcard.guard --data infra/template.yml

artifacts:
  files:
    - "**/*"
